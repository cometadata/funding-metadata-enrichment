model: "meta-llama/Llama-3.1-8B-Instruct"
mode: "online"

lora:
  path: "cometadata/funding-parsing-lora-Llama_3.1_8B-ep1-r64-a128-synthetic"
  name: "funding-parsing-lora"
  max_rank: 64
  max_loras: 1

engine:
  tensor_parallel_size: 1
  max_model_len: 4096
  gpu_memory_utilization: 0.9
  dtype: "auto"
  quantization: null
  enable_prefix_caching: true

server:
  url: null
  api_key: null
  timeout: 120

sampling:
  temperature: 0.1
  top_p: 0.9
  top_k: 20
  max_tokens: 2048
  enable_thinking: false
  thinking_budget: null
  presence_penalty: 0.5
  extraction_passes: 1
  guided_decoding: false

benchmark:
  config_name: "llama-3.1-8b-lora-entities"
  workers: 64
