# Generic vLLM config — no model specified.
# Use a named config (qwen3-8b.yaml, llama-3.1-8b.yaml, etc.)
# or pass --model to override.
mode: "offline"

lora:
  path: null
  name: null
  max_rank: 64
  max_loras: 1

engine:
  tensor_parallel_size: 1
  max_model_len: 16384
  gpu_memory_utilization: 0.9
  dtype: "auto"
  quantization: null
  enable_prefix_caching: true

server:
  url: null
  api_key: null
  timeout: 120

sampling:
  temperature: 0.7
  top_p: 0.9
  top_k: 20
  max_tokens: 4096
  enable_thinking: false
  thinking_budget: null
  presence_penalty: 0.0
  extraction_passes: 3
  guided_decoding: false

benchmark:
  config_name: null
  workers: 64
