model: "Qwen/Qwen3-8B"
mode: "online"

lora:
  path: null
  name: null
  max_rank: 64
  max_loras: 1

engine:
  tensor_parallel_size: 1
  max_model_len: 32768
  gpu_memory_utilization: 0.95
  dtype: "auto"
  quantization: null
  enable_prefix_caching: true

server:
  url: "http://localhost:8000/v1"
  api_key: null
  timeout: 120
  reasoning_parser: "qwen3"

sampling:
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  max_tokens: 16384
  enable_thinking: false
  thinking_budget: null
  presence_penalty: 0.0
  extraction_passes: 1
  guided_decoding: false

benchmark:
  config_name: "qwen3-8b-entities"
  workers: 64
