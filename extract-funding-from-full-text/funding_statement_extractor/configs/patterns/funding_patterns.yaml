# Regex patterns for identifying funding statements in text
# These patterns are used to detect paragraphs that likely contain funding information

patterns:
  - '\backnowledg\w*\s+(?:funding|financial|support)'
  - '\backnowledg\w*\s+(?:the|a|an)\s+support\s+(?:of|from)'
  - '\bfund\w*\s+(?:by|from|through)'
  - '\bsupport\w*\s+(?:by|from|through)(?!\s+(?:table|figure|fig\.|section|eq\.|equation))'
  - '\bgrant\w*\s+(?:from|by|number|no\.?|#)'
  - '\baward\w*\s+(?:from|by|number|no\.?|#)'
  - '\bproject\s+(?:number|no\.?|#)'
  - '\bcontract\s+(?:number|no\.?|#)'
  - '\bfinancial\w*\s+support'
  - '\bresearch\w*\s+(?:fund|support)'
  - '\bthis\s+(?:work|research|study)\s+(?:was|is)\s+(?:supported|funded)'
  - '\bgrateful\w*\s+(?:for|to).*(?:fund|support)'
  - '\bthank\w*\s+(?:for|to).*(?:fund|support)'
  - '\bthank\w*\s+.*\s+for\s+(?:their|his|her)\s+contribution'
  - '\bsupport\w*\s+(?:[\w\s]{0,20})?(?:by|from|through)(?!\s+(?:table|figure|fig\.|section|eq\.|equation))'
  - '\bgrant\s+[a-z0-9]'
  - '\baward\s+[a-z0-9]'
  - '\bhospitality\s+of'
  - '\bfacilities\s+(?:of|provided\s+by)'
  - '\bscholarship'
  - '\bfellowship'
  - '\bsupported\s+in\s+part\s+by'
  - '\bthank\w*\s+(?:[a-z]+(?:\s+[a-z]+)*)\s+for\s+(?:letting|providing|support)'
  - '\bthank\w*\s+.*support'
  - '\bthank\w*\s+.*fund'
  - '\bwork\s+.*supported\s+by'
  - '\breceived\s+.*funding'
  - '\bfunding:'
  - '\bfinanced\s+(?:by|in\s+part)'
  - 'conducted at'
  - 'carried out (?:at|within)'
  - 'The research of .* was (?:partially )?supported by'
  - 'Work done at'
  - 'This research used resources of'
  - 'by supported'
  - 'supported by .* grant'

negative_patterns:
  - 'supported by (?:table|figure|fig\.|section|eq\.|equation|ref\.|reference|experiment|result|data|evidence|observation|analysis|study|theory|hypothesis|argument|claim|assumption|proposition|lemma|theorem|corollary|proof|definition|example|case|scenario|model|method|algorithm|approach|technique|strategy|measure|metric|standard|criterion|guideline|rule|regulation|procedure|process|system|mechanism|device|tool|instrument|apparatus|machine|engine|logic|reason|cause|effect|consequence|outcome|impact|influence|factor|variable|parameter|coefficient|constant|value|number|quantity|amount|rate|ratio|percentage|proportion|fraction|part|whole|set|group|class|category|type|kind|sort|form|shape|size|color|texture|pattern|structure|function|behavior|property|attribute|characteristic|feature|quality|state|condition|situation|circumstance|event|occurrence|incident|accident|problem|issue|challenge|difficulty|obstacle|barrier|limitation|constraint|restriction|requirement|demand|need|desire|wish|hope|expectation|prediction|forecast|projection|estimate|guess|speculation|opinion|belief|view|perspective|standpoint|position|attitude|sentiment|feeling|emotion|mood|temperament|personality|character|nature|spirit|soul|mind|body|heart|head|hand|foot|eye|ear|nose|mouth|face|voice|speech|language|word|phrase|sentence|paragraph|text|document|book|article|paper|report|thesis|dissertation|presentation|lecture|seminar|workshop|conference|meeting|symposium|congress|convention)'
  - 'supported by (?:previous|earlier|recent|related|similar|other) (?:work|study|research|finding|result|observation|evidence)'
  - 'supported by (?:the )?state-of-the-art'