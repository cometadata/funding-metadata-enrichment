model: "meta-llama/Llama-3.1-8B-Instruct"
mode: "offline"

lora:
  path: null
  name: null
  max_rank: 64
  max_loras: 1

engine:
  tensor_parallel_size: 1
  max_model_len: 4096
  gpu_memory_utilization: 0.9
  dtype: "auto"
  quantization: null
  enable_prefix_caching: true

server:
  url: null
  api_key: null
  timeout: 120

sampling:
  temperature: 0.1
  top_p: 0.9
  top_k: 20
  max_tokens: 16384
  enable_thinking: false
  thinking_budget: null
  presence_penalty: 0.5
  extraction_passes: 1
  batch_length: 64

benchmark:
  config_name: "llama-3.1-8b-entities"
  workers: 64

extraction:
  prompt_template: "extraction_prompt.txt"
  output_format: "direct"
  stop_sequences:
    - "\nQ:"