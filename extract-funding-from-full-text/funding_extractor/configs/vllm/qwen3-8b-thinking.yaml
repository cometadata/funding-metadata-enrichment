model: "Qwen/Qwen3-8B"
mode: "online"

lora:
  path: null
  name: null
  max_rank: 64
  max_loras: 1

engine:
  tensor_parallel_size: 1
  max_model_len: 32768
  gpu_memory_utilization: 0.95
  dtype: "auto"
  quantization: null
  enable_prefix_caching: true

server:
  url: "http://localhost:8000/v1"
  api_key: null
  timeout: 600

sampling:
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  max_tokens: 16384
  enable_thinking: true
  thinking_budget: null
  presence_penalty: 1.5
  extraction_passes: 1
  batch_length: 64

benchmark:
  config_name: "qwen3-8b-entities-thinking"
  workers: 64
