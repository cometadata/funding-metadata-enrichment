model: "Qwen/Qwen3-8B"
mode: "online"

lora:
  path: "cometadata/funding-parsing-lora-Qwen3_8B-ep1-r16-a32-distill-GLM_4.5_Air"
  name: "funding-parsing-lora"
  max_rank: 64
  max_loras: 1

engine:
  tensor_parallel_size: 1
  max_model_len: 32768
  gpu_memory_utilization: 0.95
  dtype: "auto"
  quantization: null
  enable_prefix_caching: true

server:
