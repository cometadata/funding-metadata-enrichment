  top_p: 0.95
  top_k: 20
  max_tokens: 16384
  enable_thinking: true
  thinking_budget: 4096
  presence_penalty: 1.5
  extraction_passes: 1
  batch_length: 64

benchmark:
  config_name: "qwen3-8b-lora-entities-thinking"
  workers: 64
