[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "extract-funding-from-full-text"
version = "0.1.0"
description = "Extract funding information from markdown documents using semantic search and LLM-based entity extraction"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "langextract>=1.0.8",
    "openai>=1.0.0",
    "pyarrow>=12.0.0",
    "pydantic>=2.0.0",
    "pylate>=0.1.0",
    "python-dotenv>=1.0.0",
    "pyyaml>=6.0",
    "requests>=2.31.0",
    "torch>=2.0.0",
    "datasets>=2.0.0",
    "ftfy>=6.0.0",
    "rapidfuzz>=3.0.0",
]

[project.optional-dependencies]
test = ["pytest>=7.0.0"]
vllm = ["vllm>=0.8.0"]

[project.scripts]
extract-funding = "funding_extractor.cli.main:main"
benchmark-funding = "funding_extractor.benchmark.cli:main"

[tool.setuptools.packages.find]
include = ["funding_extractor*"]

[tool.setuptools.package-data]
funding_extractor = [
    "configs/queries/*.yaml",
    "configs/patterns/*.yaml",
    "configs/prompts/*.txt",
    "configs/prompts/*.json",
    "configs/vllm/*.yaml",
]
